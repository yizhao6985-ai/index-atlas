# 仅启动 PostgreSQL（本地开发时 api / web / worker 在宿主机运行）
# 用法：docker compose -f docker-compose.db.yml up -d
# 连接串：postgresql://postgres:postgres@localhost:5432/index_atlas
# 宿主机上的 api/worker 请在仓库根目录配置 `.env`（见根目录 `.env.example`）。
#
# 首次初始化时，会按文件名顺序执行 db/migrations/*.sql（与全栈 compose 的 db 一致）。
# 若需重跑迁移，请 down -v 清空卷或手动在已有库执行 SQL。

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: index_atlas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d index_atlas"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
