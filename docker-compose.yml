# DB 镜像默认走阿里云 library（同步 Docker Hub），避免服务器直连 registry-1.docker.io 超时。
# 如需官方 Hub：改为 postgres:16-alpine 并配置本机 registry-mirrors。
services:
  db:
    image: registry.cn-hangzhou.aliyuncs.com/library/postgres:16-alpine
    environment:
      POSTGRES_DB: index_atlas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d index_atlas"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/index_atlas
      PORT: "3001"
      BFF_CACHE_TTL_MS: "4000"
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/index_atlas
      TUSHARE_TOKEN: ${TUSHARE_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  pgdata:
