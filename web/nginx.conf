# 在 conf.d 中由主配置 http {} include；此处指令处于 http 上下文
# 官方 nginx 仅使用 gzip（兼容性好；主 nginx.conf 中 gzip 默认为注释关闭）

gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 5;
gzip_min_length 256;
gzip_types
    text/html
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/json
    application/xml
    application/xhtml+xml
    image/svg+xml;

server {
    listen 80;
    server_name www.indexatlas.xyz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name www.indexatlas.xyz;

    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate     /etc/nginx/certs/www.indexatlas.xyz.pem;
    ssl_certificate_key /etc/nginx/certs/www.indexatlas.xyz.key;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000" always;

    location /api/ {
        proxy_pass http://api:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 非 HTML 静态资源：协商缓存（ETag / Last-Modified + 验证后再用缓存）
    location ~* \.(?:css|js|mjs|map|json|png|jpg|jpeg|gif|webp|svg|ico|woff2?|ttf|eot|otf)$ {
        etag on;
        if_modified_since exact;
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
